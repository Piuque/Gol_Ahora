<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Gestión de Torneos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-football-dark text-light">

    <div class="d-flex" id="wrapper">
        <div class="bg-navy border-end border-secondary border-opacity-25" id="sidebar-wrapper">
            <div class="sidebar-heading text-white fw-bold d-flex align-items-center p-3 border-bottom border-secondary border-opacity-25">
                <i class="fa-solid fa-futbol text-sports me-2"></i> GOL AHORA
            </div>
            
            <div id="user-profile-summary" class="p-3 border-bottom border-secondary border-opacity-25 bg-dark-navy">
                <div class="d-flex align-items-center">
                    <div class="avatar-box bg-success bg-opacity-25 text-sports rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 40px; height: 40px;">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="fw-bold text-white text-truncate lh-1 small" id="sidebar-user-fullname">Cargando...</div>
                        <small class="text-sports text-uppercase fw-bold tracking-wider" style="font-size: 0.65rem;">Profesor</small>
                    </div>
                </div>
            </div>

            <ul class="nav flex-column mt-2" id="sidebar-menu-items">
                <li><a class="nav-link text-white d-flex align-items-center py-2.5 px-3 sidebar-link" href="perfilProfesor.html"><i class="fa-solid fa-user-gear me-3"></i>Mi Perfil Técnico</a></li>
                <li><a class="nav-link text-white d-flex align-items-center py-2.5 px-3 sidebar-link" href="interfazProfesor.html"><i class="fa-solid fa-clipboard-user me-3"></i>Gestión de Clases</a></li>
                <li><a class="nav-link text-white d-flex align-items-center py-2.5 px-3 sidebar-link active" href="gestionTorneos.html"><i class="fa-solid fa-trophy me-3"></i>Gestión de Torneos</a></li>
                <li class="nav-item mt-4">
                    <a class="nav-link text-danger d-flex align-items-center py-2.5 px-3 sidebar-link" href="#" id="btn-logout-action"><i class="fa-solid fa-right-from-bracket me-3"></i><span>Cerrar Sesión</span></a>
                </li>
            </ul>
        </div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column">
            <nav class="navbar navbar-expand-lg navbar-dark bg-navy border-bottom border-secondary border-opacity-25 px-4 py-2">
                <button class="btn btn-outline-success btn-sm border-sports text-sports" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <div class="border-start border-secondary border-opacity-50 ps-3">
                        <span class="small text-light-75 fw-medium" id="top-navbar-user-name">Cargando...</span>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4 flex-grow-1">
                <div class="card bg-navy border-0 shadow-lg p-4" id="main-workspace-card">
                    <h4 class="fw-bold mb-0 text-white text-uppercase tracking-wide">Gestión de Torneos Asignados</h4>
                    <hr class="border-secondary border-opacity-50 my-3">
                    
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-striped align-middle mb-0 small border border-secondary border-opacity-10">
                            <thead>
                                <tr>
                                    <th>Torneo</th>
                                    <th>Partido / Cruce</th>
                                    <th>Fecha Encuentro</th>
                                    <th>Participantes</th>
                                    <th>Resultado</th>
                                    <th class="text-center">Planilla</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-torneos-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="js/datosPersonalesProfesores.js"></script>

</html>
