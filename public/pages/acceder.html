<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/pages/css/style.css">
    <link rel="stylesheet" href="/css/login.css">

</head>
<body class="bg-football-dark d-flex align-items-center justify-content-center vh-100 px-3">

    <div class="card login-card border-0 shadow-lg p-4 my-2" style="max-width: 440px;">
        <div class="text-center mb-4">
            <div class="text-decoration-none text-white d-flex align-items-center justify-content-center mb-2">
                <i class="fa-solid fa-futbol text-sports fa-2x me-2" style="color: #00C16E;"></i>
                <span class="fs-3 fw-bold text-uppercase tracking-wide">Gol Ahora</span>
            </div>
            <p class="text-light-50 small">Ingresá tus credenciales para acceder</p>
        </div>

        <p class="error escondido text-danger small mb-3" id="mensaje-error"></p>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label small fw-bold text-white">Email o Usuario</label>
                <input type="text" id="username" class="form-control bg-football-dark border-secondary text-white" placeholder="ejemplo@correo.com o usuario_admin" required autocomplete="username">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-white">Contraseña</label>
                <input type="password" id="password" class="form-control bg-football-dark border-secondary text-white" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-sports w-100 py-2 fw-bold">
                Iniciar Sesión
            </button>
        </form>

        <div class="text-center small mt-3">
            <span class="text-light-50">¿No tenés cuenta?</span>
            <a href="/pages/registro.html" style="color: #00C16E;" class="fw-bold text-decoration-none ms-1">Registrate</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/pages/js/acceder.js"></script>
</body>
</html>
