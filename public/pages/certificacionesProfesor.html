<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora — Mis Certificaciones (Profesor)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        html, body { height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #071524 !important; }
        #wrapper { display: flex; width: 100%; height: 100vh; }
        #sidebar-wrapper {
            min-width: 290px; max-width: 290px; background-color: #0A2540;
            display: flex; flex-direction: column;
            transition: margin-left 0.25s ease-in-out, min-width 0.25s ease-in-out, max-width 0.25s ease-in-out;
        }
        #wrapper.toggled #sidebar-wrapper { min-width: 0; max-width: 0; overflow: hidden; }
        .sidebar-data-scroll { flex-grow: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,193,7,0.4) transparent; }
        #page-content-wrapper { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; background-color: #071524; }
        #page-content-wrapper main { overflow-y: auto; }
    </style>
</head>
<body class="bg-football-dark text-white">

<div id="wrapper">
    <aside id="sidebar-wrapper" class="border-end border-secondary border-opacity-10 shadow-lg">
        <div class="p-4 border-bottom border-secondary border-opacity-25">
            <div class="d-flex align-items-center">
                <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm"
                     style="width:54px;height:54px;background:rgba(255,193,7,0.12);">
                    <i class="fa-solid fa-chalkboard-user text-warning fs-4"></i>
                </div>
                <div class="overflow-hidden">
                    <h6 class="fw-bold text-white mb-0 text-truncate id-nombre-completo" style="font-size:1rem;">Cargando...</h6>
                    <span class="badge mt-1 text-uppercase fw-bold"
                          style="background:rgba(255,193,7,0.15);color:#ffc107;border:1px solid rgba(255,193,7,0.35);font-size:0.65rem;letter-spacing:0.5px;">Profesor</span>
                </div>
            </div>
        </div>
        <div class="sidebar-data-scroll p-4">
            <h6 class="text-warning text-uppercase fw-bold mb-3" style="font-size:0.75rem;letter-spacing:1px;">Información Personal</h6>
            <div class="mb-3"><small class="text-light-50 d-block" style="font-size:0.7rem;">DOCUMENTO (DNI)</small><span class="text-white fw-medium small input-Dni">...</span></div>
            <div class="mb-3"><small class="text-light-50 d-block" style="font-size:0.7rem;">EMAIL</small><span class="text-white fw-medium small text-break input-Email">...</span></div>
            <div class="mb-3"><small class="text-light-50 d-block" style="font-size:0.7rem;">TELÉFONO</small><span class="text-white fw-medium small input-Telefono">...</span></div>
            <div class="mb-3"><small class="text-light-50 d-block" style="font-size:0.7rem;">FECHA DE NACIMIENTO</small><span class="text-white fw-medium small input-Fecha">...</span></div>
            <div class="mb-3"><small class="text-light-50 d-block" style="font-size:0.7rem;">GÉNERO / NACIONALIDAD</small><span class="text-white fw-medium small"><span class="input-Genero">...</span> / <span class="input-Nacionalidad">...</span></span></div>
            <div class="mb-2"><small class="text-light-50 d-block" style="font-size:0.7rem;">DOMICILIO</small><span class="text-white fw-medium small input-Direccion">...</span></div>
        </div>
        <div class="p-3 border-top border-secondary border-opacity-25" style="background:rgba(0,0,0,0.15);">
            <a href="/profesor" class="btn btn-outline-warning w-100 fw-bold py-2 mb-2 rounded-3 text-warning">
                <i class="fa-solid fa-arrow-left me-2"></i> Panel Principal
            </a>
            <a href="/profesor/perfil" class="btn btn-warning w-100 fw-bold py-2 mb-2 rounded-3 text-dark">
                <i class="fa-solid fa-user-gear me-2"></i> Mi Perfil Técnico
            </a>
            <button onclick="cerrarSesion()" class="btn btn-outline-danger w-100 fw-bold py-2 rounded-3">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Salir
            </button>
        </div>
    </aside>

    <div id="page-content-wrapper">
        <header class="navbar navbar-dark bg-navy py-3 px-4 border-bottom border-secondary border-opacity-10 shadow-sm">
            <div class="container-fluid p-0 d-flex align-items-center">
                <button class="btn btn-outline-warning btn-sm border-warning text-warning me-3" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <span class="navbar-brand fw-bold m-0 text-uppercase fs-5"><i class="fa-solid fa-graduation-cap text-sports me-2"></i>Mis Certificaciones</span>
                <span class="text-light-50 small fw-medium text-uppercase ms-auto" id="nav-welcome" style="font-size:0.75rem;">...</span>
            </div>
        </header>

        <main class="container-fluid flex-grow-1 px-4 pt-3 pb-4" style="max-width:1200px;">
            <div class="panel-operativo p-4" style="background:#0A2540;border:1px solid rgba(255,255,255,0.05);border-radius:12px;">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h5 class="fw-bold text-white mb-0">Legajo técnico y documentación</h5>
                    <button class="btn btn-sm btn-outline-warning border-warning text-warning fw-semibold px-3"
                        data-bs-toggle="modal" data-bs-target="#modalAltaCertificacion" type="button">
                        <i class="fa-solid fa-plus me-1"></i>Agregar Certificación
                    </button>
                </div>
                <hr class="border-secondary border-opacity-50 mb-4">
                <div class="row g-3" id="contenedor-certificaciones-cards">
                    <div class="col-12 text-center py-5 text-light-50">
                        <div class="spinner-border text-warning" role="status"></div>
                        <p class="mt-3 small">Cargando certificaciones...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="modalAltaCertificacion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
        <div class="modal-content" style="background-color:#0a2540;border:1px solid rgba(255,255,255,0.1);border-radius:8px;">
            <div class="modal-header border-bottom border-secondary border-opacity-25 pb-3">
                <h6 class="modal-title fw-bold text-uppercase text-sports mb-0">
                    <i class="fa-solid fa-cloud-arrow-up me-2"></i>Registrar Título / Certificado
                </h6>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-alta-certificacion" novalidate>
                <div class="modal-body py-3">
                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Nombre de la Certificación <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-nombre" required autocomplete="off" placeholder="Ej: Profesor de Educación Física">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Institución Emisora <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-institucion" required autocomplete="off" placeholder="Ej: Universidad / CONMEBOL">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Fecha de Emisión <span class="text-danger">*</span></label>
                        <input type="date" class="form-control bg-football-dark text-white border-secondary shadow-none" id="cert-fecha" required>
                    </div>
                    <div class="mb-1">
                        <label class="form-label small text-light-75 mb-1">Adjuntar Comprobante <span class="text-danger">*</span></label>
                        <input type="file" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-archivo" accept="image/*,application/pdf" required>
                    </div>
                </div>
                <div class="modal-footer border-top border-secondary border-opacity-25 pt-3">
                    <button type="button" class="btn btn-sm btn-secondary px-3" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-warning text-dark px-4">
                        <i class="fa-solid fa-paper-plane me-1"></i>Enviar a Auditoría
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/tecnicoSidebarUtil.js"></script>
<script src="/js/certificacionesUtil.js"></script>
<script src="/js/datosPersonalesProfesor.js"></script>
</body>
</html>
