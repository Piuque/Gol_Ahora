<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Mis Pagos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #071524 !important;
        }
        .scroll-horizontal {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 1.5rem;
            padding-bottom: 2rem;
            padding-top: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #63b3ed #0A2540;
        }
        .scroll-horizontal::-webkit-scrollbar { height: 10px; }
        .scroll-horizontal::-webkit-scrollbar-track { background: rgba(10, 37, 64, 0.5); border-radius: 10px; }
        .scroll-horizontal::-webkit-scrollbar-thumb { background: #63b3ed; border-radius: 10px; }

        .pago-card {
            background-color: var(--bg-navy, #0A2540);
            border: 1px solid rgba(99, 179, 237, 0.12);
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 20px;
            min-width: 270px;
            max-width: 290px;
            min-height: 400px;
            flex: 0 0 auto;
        }
        .pago-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(99, 179, 237, 0.15) !important;
            border-color: rgba(99, 179, 237, 0.4);
        }
        .monto-display {
            font-size: 1.35rem;
            font-weight: 700;
            color: #63b3ed;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="bg-football-dark py-5 px-3">

<div class="container mx-auto" style="max-width: 950px; min-height: 75vh; display: flex; flex-direction: column; justify-content: center;">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <a href="interfazCliente.html" class="fw-bold text-decoration-none mb-3 mb-md-0" style="color: #63b3ed;">
            <i class="fa-solid fa-arrow-left me-2"></i> Volver al panel principal
        </a>

        <div class="text-center">
            <h3 class="fw-bold text-white text-uppercase mb-0">
                <i class="fa-solid fa-receipt me-2" style="color: #63b3ed;"></i>Mis Pagos
            </h3>
        </div>

        <div style="width: 180px;" class="d-none d-md-block"></div>
    </div>

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3 mb-3">
        <p class="text-light-50 small mb-0">
            <i class="fa-solid fa-arrows-left-right me-2" style="color: #63b3ed;"></i>Deslizá para ver todos tus cobros
        </p>
        <div class="d-flex flex-wrap gap-2" id="filtros-pagos">
            <button class="btn btn-sm fw-bold filtro-btn active" data-filtro="todas"
                    style="background:rgba(99,179,237,0.15);border:1px solid rgba(99,179,237,0.4);color:#63b3ed;border-radius:20px;padding:5px 16px;">
                Todos
            </button>
            <button class="btn btn-sm fw-bold filtro-btn" data-filtro="Pendiente"
                    style="background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25);color:#ffc107;border-radius:20px;padding:5px 16px;">
                Pendientes
            </button>
            <button class="btn btn-sm fw-bold filtro-btn" data-filtro="Pagado"
                    style="background:rgba(0,193,110,0.08);border:1px solid rgba(0,193,110,0.25);color:#00C16E;border-radius:20px;padding:5px 16px;">
                Pagados
            </button>
            <button class="btn btn-sm fw-bold filtro-btn" data-filtro="Cancelado"
                    style="background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.2);color:#94a3b8;border-radius:20px;padding:5px 16px;">
                Cancelados
            </button>
        </div>
    </div>

    <div id="contenedor-pagos" class="scroll-horizontal">
        <div class="w-100 text-center py-5">
            <div class="spinner-border" role="status" style="color: #63b3ed;"></div>
            <p class="text-light-50 mt-2 small">Buscando tus pagos...</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/misPagos.js"></script>
</body>
</html>
