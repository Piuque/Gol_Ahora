<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <style>
        .reserva-card {
            background-color: #0d1f33;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            padding: 16px;
        }
        .reserva-card:hover {
            transform: translateY(-3px);
            border-color: #00C16E;
        }
        .badge-estado {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .badge-pendiente { background-color: #f59e0b; color: white; }
        .badge-aprobado { background-color: #00C16E; color: white; }
        .badge-cancelado { background-color: #ef4444; color: white; }
        .search-input {
            background-color: #0d1f33 !important;
            border-color: rgba(255,255,255,0.15) !important;
            color: white !important;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.35) !important; }
    </style>
</head>
<body class="bg-football-dark px-3 py-5">

    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-white text-uppercase mb-1">Reservas</h3>
                <p class="text-light-50 small mb-0">Listado de reservas registradas</p>
            </div>
            <a href="/admin" style="color: #00C16E;" class="fw-bold text-decoration-none small">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>

        <div class="mb-3">
            <input type="text" id="buscador" class="form-control search-input" placeholder="Buscar por nombre, cancha o estado...">
        </div>

        <div id="contenedor-reservas" class="d-flex flex-column gap-2">
            <div class="text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="text-light-50 mt-2 small">Cargando reservas...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalReserva" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-2">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modal-titulo"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="modal-info"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm text-white" style="background-color: #00C16E;" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/listarReservas.js"></script>
</body>
</html>
