<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Ver Canchas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    <style>
        .cancha-card {
            background-color: #0d1f33;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .cancha-card:hover {
            transform: translateY(-4px);
            border-color: #00C16E;
        }
        .cancha-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
        .badge-tipo {
            background-color: #00C16E;
            color: white;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .modal-content {
            background-color: #0A2540;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            font-size: 0.9rem;
        }
        .info-label { color: rgba(255,255,255,0.5); }
        .info-value { color: white; font-weight: 500; }
        .search-input {
            background-color: #0d1f33 !important;
            border-color: rgba(255,255,255,0.15) !important;
            color: white !important;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.35) !important; }
    </style>
</head>
<body class="bg-football-dark px-3 py-5">

    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold text-white text-uppercase mb-1">Canchas</h3>
                <p class="text-light-50 small mb-0">Listado de canchas registradas</p>
            </div>
            <a href="/admin" style="color: #00C16E;" class="fw-bold text-decoration-none small">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>

        <div class="mb-3 d-flex gap-2">
            <input type="text" id="buscador" class="form-control search-input" placeholder="Buscar cancha...">
            <select id="selector-tipo" class="form-control search-input" style="max-width: 200px;">
                <option value="">Todos los tipos</option>
            </select>
        </div>

        <div id="contenedor-canchas" class="row g-3">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="text-light-50 mt-2 small">Cargando canchas...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalCancha" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-2">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modal-nombre"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img id="modal-img" src="" alt="Cancha" class="modal-img">
                    <div id="modal-info"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm text-white" style="background-color: #00C16E;" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/verCanchas.js"></script>
</body>
</html>
