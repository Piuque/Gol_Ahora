<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-football-dark d-flex align-items-center justify-content-center py-5 px-3">

    <div class="card login-card border-0 shadow-lg p-4 my-2" style="max-width: 560px;">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none text-white d-flex align-items-center justify-content-center mb-2">
                <i class="fa-solid fa-futbol text-sports fa-2x me-2"></i>
                <span class="fs-3 fw-bold text-uppercase tracking-wide">Creá tu cuenta</span>
            </a>
            <p class="text-light-50 small">Formá parte de la comunidad de Gol Ahora</p>
        </div>

        <div class="error escondido"></div>

        <form id="register-form" class="needs-validation" novalidate>
            
            <!-- Nombre y Apellido -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Nombre</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="nombre" required>
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Apellido</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="apellido" required>
                </div>
            </div>

            <!-- DNI y Fecha nacimiento -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">DNI</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="dni" required placeholder="Sin puntos">
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Fecha de Nacimiento</label>
                    <input type="date" class="form-control bg-football-dark border-secondary text-white" id="fecha_nacimiento" required>
                </div>
            </div>

            <!-- Email y Teléfono -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Email</label>
                    <input type="email" class="form-control bg-football-dark border-secondary text-white" id="email" required placeholder="nombre@correo.com">
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Teléfono</label>
                    <input type="tel" class="form-control bg-football-dark border-secondary text-white" id="telefono" required placeholder="11 1234 5678">
                </div>
            </div>

            <!-- Género y Nacionalidad -->
            <div class="row g-2 mb-3">
                <div class="col-6" style="position: relative;">
                    <label class="form-label small fw-bold text-white ">Género</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="genero" required placeholder="Escribí tu género">
                    <div id="genero-suggestions" class="suggestions"></div>
                </div>
                <div class="col-6" style="position: relative;">
                    <label class="form-label small fw-bold text-white">Nacionalidad</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="nacionalidad" required placeholder="Ej: Argentina">
                    <div id="nacionalidad-suggestions" class="suggestions"></div>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Contraseña</label>
                    <input type="password" class="form-control bg-football-dark border-secondary text-white" id="password" minlength="6" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Confirmar Contraseña</label>
                    <input type="password" class="form-control bg-football-dark border-secondary text-white" id="confirm_password" required placeholder="Repetir contraseña">
                </div>
            </div>

            <!-- Dirección -->
            <p class="text-light-50 small mb-2 mt-1">Dirección</p>
            <div class="row g-2 mb-3">
                <div class="col-8">
                    <label class="form-label small fw-bold text-white">Calle</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="calle" required placeholder="Nombre de la calle">
                </div>
                <div class="col-4">
                    <label class="form-label small fw-bold text-white">Número</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="numero" required placeholder="1234">
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-4">
                    <label class="form-label small fw-bold text-white">Código Postal</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="codigo_postal" required placeholder="1234">
                </div>
                <div class="col-8" style="position: relative;">
                    <label class="form-label small fw-bold text-white">País</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="pais" required placeholder="Ej: Argentina">
                    <div id="pais-suggestions" class="suggestions"></div>
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Provincia</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="provincia" required placeholder="Ej: Buenos Aires">
                    <div id="provincia-suggestions" class="suggestions"></div>
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-white">Ciudad</label>
                    <input type="text" class="form-control bg-football-dark border-secondary text-white" id="ciudad" required placeholder="Ej: La Plata">
                    <div id="ciudad-suggestions" class="suggestions"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-white">Localidad</label>
                <input type="text" class="form-control bg-football-dark border-secondary text-white" id="localidad" required placeholder="Ej: Florencio Varela">
                <div id="localidad-suggestions" class="suggestions"></div>
            </div>

            <button type="submit" class="btn btn-sports w-100 py-2 fw-bold">
                Registrarse
            </button>
        </form>

        <div class="text-center small mt-3">
            <span class="text-light-50">¿Ya tenés cuenta?</span>
            <a href="/Acceder" style="color: #00C16E;" class="fw-bold text-decoration-none ms-1">Iniciá sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/registro.js"></script>
</body>
</html>
