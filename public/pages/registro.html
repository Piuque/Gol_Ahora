<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gol Ahora - Registro de Cliente</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #10b981;
      --primary-hover: #059669;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Fondo dinámico sutil */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.03) 0%, transparent 50%);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary) 0%, #047857 100%);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      padding: 0.3rem 1rem;
      border-radius: 8px;
      transform: rotate(-2deg);
      margin-bottom: 1rem;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Mensajes de respuesta */
    .alert {
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: none;
      border: 1px solid transparent;
      animation: fadeIn 0.3s ease;
    }

    .alert-error {
      background-color: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.2);
      color: #a7f3d0;
    }

    /* Secciones del formulario */
    .form-section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      color: var(--primary);
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input, select {
      background-color: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    /* Botón moderno */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo">GOL AHORA</div>
      <h1>Registro de Cliente</h1>
      <p class="subtitle">Regístrate para reservar canchas y coordinar tus entrenamientos</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="registroForm">
      <!-- Datos de Cuenta -->
      <div class="form-section">
        <div class="section-title">👤 Datos de la Cuenta</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="username">Nombre de Usuario *</label>
            <input type="text" id="username" required placeholder="ej: leo10">
          </div>
          <div class="form-group">
            <label for="email">Correo Electrónico *</label>
            <input type="email" id="email" required placeholder="ej: leo@correo.com">
          </div>
          <div class="form-group">
            <label for="password">Contraseña *</label>
            <input type="password" id="password" required placeholder="Min. 6 caracteres">
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="ej: 1123456789">
          </div>
        </div>
      </div>

      <!-- Datos Personales -->
      <div class="form-section">
        <div class="section-title">📋 Datos Personales</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" required placeholder="ej: Lionel">
          </div>
          <div class="form-group">
            <label for="apellido">Apellido *</label>
            <input type="text" id="apellido" required placeholder="ej: Messi">
          </div>
          <div class="form-group">
            <label for="dni">DNI *</label>
            <input type="text" id="dni" required placeholder="ej: 12345678">
          </div>
          <div class="form-group">
            <label for="fecha_nacimiento">Fecha de Nacimiento *</label>
            <input type="date" id="fecha_nacimiento" required>
          </div>
          <div class="form-group">
            <label for="genero">Género *</label>
            <select id="genero" required>
              <option value="">Seleccione...</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="nacionalidad">Nacionalidad *</label>
            <input type="text" id="nacionalidad" required placeholder="ej: Argentina">
          </div>
        </div>
      </div>

      <!-- Dirección -->
      <div class="form-section">
        <div class="section-title">📍 Dirección y Localización</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="calle">Calle *</label>
            <input type="text" id="calle" required placeholder="ej: Av. Siempre Viva">
          </div>
          <div class="form-group">
            <label for="numero">Número *</label>
            <input type="text" id="numero" required placeholder="ej: 742">
          </div>
          <div class="form-group">
            <label for="codigo_postal">Código Postal *</label>
            <input type="text" id="codigo_postal" required placeholder="ej: 1888">
          </div>
          <div class="form-group">
            <label for="localidad">Localidad *</label>
            <input type="text" id="localidad" required placeholder="ej: Florencio Varela">
          </div>
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="btn-submit">
        <span>Registrarse Ahora</span>
      </button>
    </form>
    
    <div class="footer-link">
      ¿Ya tienes cuenta? <a href="/swagger-ui">Accede vía Swagger</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registroForm');
    const alertDiv = document.getElementById('alert');
    const btnSubmit = document.getElementById('btnSubmit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Mostrar estado de carga
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = '<span>Procesando registro...</span>';
      alertDiv.style.display = 'none';

      // Capturar datos del formulario
      const payload = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        telefono: document.getElementById('telefono').value.trim() || '-',
        nombre: document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        dni: document.getElementById('dni').value.trim(),
        fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
        genero: document.getElementById('genero').value,
        nacionalidad: document.getElementById('nacionalidad').value.trim(),
        calle: document.getElementById('calle').value.trim(),
        numero: document.getElementById('numero').value.trim(),
        codigo_postal: document.getElementById('codigo_postal').value.trim(),
        localidad: document.getElementById('localidad').value.trim()
      };

      try {
        const response = await fetch('/usuario/registro', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          alertDiv.className = 'alert alert-success';
          alertDiv.innerHTML = `<strong>¡Registro Exitoso!</strong> Bienvenido/a, ${data.usuario.nombre}. Tu ID de usuario es <strong>${data.usuario.id_usuario}</strong> con nivel <strong>${data.usuario.user_level}</strong>.`;
          alertDiv.style.display = 'block';
          form.reset();
        } else {
          alertDiv.className = 'alert alert-error';
          alertDiv.innerHTML = `<strong>Error:</strong> ${data.error || 'No se pudo completar el registro'}. ${data.details || ''}`;
          alertDiv.style.display = 'block';
        }
      } catch (err) {
        alertDiv.className = 'alert alert-error';
        alertDiv.innerHTML = `<strong>Error de conexión:</strong> No se pudo comunicar con el servidor backend.`;
        alertDiv.style.display = 'block';
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '<span>Registrarse Ahora</span>';
      }
    });
  </script>
</body>
</html>
