<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Mis Entrenamientos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Estructura Base */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #071524 !important;
        }

        /* Carrusel Horizontal con barra de scroll roja */
        .scroll-horizontal {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 1.5rem;
            padding-bottom: 2rem;
            padding-top: 1rem;
            scrollbar-width: thin;
            scrollbar-color: #dc3545 #0A2540;
        }
        .scroll-horizontal::-webkit-scrollbar {
            height: 10px;
        }
        .scroll-horizontal::-webkit-scrollbar-track {
            background: rgba(10, 37, 64, 0.5);
            border-radius: 10px;
        }
        .scroll-horizontal::-webkit-scrollbar-thumb {
            background: #dc3545;
            border-radius: 10px;
        }

        /* Tarjeta Formato Retrato */
        .entrenamiento-card {
            background-color: #0A2540;
            border: 1px solid rgba(220, 53, 69, 0.1);
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            padding: 24px 20px;
            min-width: 270px;
            max-width: 290px;
            min-height: 360px;
            flex: 0 0 auto;
        }
        .entrenamiento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.2) !important;
            border-color: rgba(220, 53, 69, 0.4);
        }

        /* Ícono Gigante y Centrado arriba */
        .icon-wrapper {
            width: 85px;
            height: 85px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease, transform 0.2s ease;
            font-size: 2.8rem;
            margin: 0 auto 1.5rem auto;
        }
        .entrenamiento-card:hover .icon-wrapper {
            color: #dc3545 !important;
            transform: scale(1.08);
        }

        /* Estilos para el Catálogo Desplegable en Acordeón */
        .hover-catalogo {
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }
        .hover-catalogo:hover {
            background-color: rgba(220, 53, 69, 0.05) !important;
            border-color: #dc3545 !important;
        }
    </style>
</head>
<body class="bg-football-dark py-5 px-3">

<div class="container mx-auto" style="max-width: 950px; min-height: 75vh; display: flex; flex-direction: column; justify-content: center;">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
        <a href="interfazCliente.html" class="fw-bold text-decoration-none text-danger mb-3 mb-md-0">
            <i class="fa-solid fa-arrow-left me-2"></i> Volver al panel principal
        </a>

        <div class="text-center">
            <h3 class="fw-bold text-white text-uppercase mb-0">
                <i class="fa-solid fa-dumbbell me-2 text-danger"></i>Mis entrenamientos
            </h3>
        </div>

        <button onclick="explorarEntrenamientos()" class="btn fw-bold px-4 py-2 mt-3 mt-md-0 text-white shadow-sm" style="background-color: #dc3545 !important; border-color: #dc3545 !important;">
            <i class="fa-solid fa-magnifying-glass me-2"></i>Explorar Entrenamientos
        </button>
    </div>

    <p class="text-light-50 small mb-2 text-center text-md-start">
        <i class="fa-solid fa-arrows-left-right me-2 text-danger"></i>Desliza para ver tus entrenamientos agendados
    </p>

    <div id="contenedor-entrenamientos" class="scroll-horizontal">
        <div class="w-100 text-center py-5">
            <div class="spinner-border text-danger" role="status"></div>
            <p class="text-light-50 mt-2 small">Cargando tus entrenamientos...</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/misEntrenamientos.js"></script>
</body>
</html>
