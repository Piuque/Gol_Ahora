<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-football-dark text-light">

<div class="d-flex" id="wrapper">

    <!-- ===================== SIDEBAR ===================== -->

        <a href="interfazEntrenador.html" class="sidebar-heading text-white fw-bold d-flex align-items-center p-3 border-bottom border-secondary border-opacity-25 text-decoration-none"
            style="transition:opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">

        </a>

        <div id="user-profile-summary" class="p-3 border-bottom border-secondary border-opacity-25">
            <div class="d-flex align-items-center">
                <div class="avatar-box bg-success bg-opacity-10 text-sports rounded-circle d-flex align-items-center justify-content-center me-2"
                    style="width:40px;height:40px;flex-shrink:0;">
                    <i class="fa-solid fa-user-gear"></i>
                </div>
                <div class="overflow-hidden">
                    <div class="fw-bold text-white text-truncate lh-1 small" id="sidebar-user-fullname">Conectando...</div>
                    <small class="text-sports text-uppercase fw-bold" style="font-size:0.63rem;letter-spacing:0.8px;">Entrenador</small>
                </div>
            </div>
        </div>

        <ul class="nav flex-column mt-2 flex-grow-1">
            <li>
                <a class="nav-link sidebar-link d-flex align-items-center" href="interfazEntrenador.html">
                    <i class="fa-solid fa-dumbbell me-3"></i>Gestión Operativa
                </a>
            </li>
            <li>
                <a class="nav-link sidebar-link active d-flex align-items-center" href="certificacionesEntrenador.html">
                    <i class="fa-solid fa-graduation-cap me-3"></i>Mis Certificaciones
                </a>
            </li>
            <li>
                <a class="nav-link sidebar-link d-flex align-items-center" href="perfilEntrenador.html">
                    <i class="fa-solid fa-user-gear me-3"></i>Mi Perfil Técnico
                </a>
            </li>
        </ul>

        <div class="p-3 border-top border-secondary border-opacity-25 mt-auto">
            <button class="btn sidebar-logout w-100 d-flex align-items-center gap-2"
                onclick="CerrarSesion()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Cerrar sesión</span>
            </button>
        </div>
    </div>
    <!-- ===================== /SIDEBAR ===================== -->

    <div id="page-content-wrapper" class="w-100 d-flex flex-column">

        <!-- TOPBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-navy border-bottom border-secondary border-opacity-25 px-4 py-2">
            <button class="btn btn-outline-success btn-sm border-sports text-sports" id="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="ms-auto">
                <span class="small text-light-75 fw-medium" id="top-navbar-user-name">Conectando...</span>
            </div>
        </nav>

        <!-- CONTENIDO -->
        <div class="container-fluid px-4 py-4 flex-grow-1">
            <div class="card bg-navy border-0 shadow-lg p-4">

                <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                    <h4 class="fw-bold text-white text-uppercase mb-0" style="letter-spacing:0.5px;">
                        <i class="fa-solid fa-graduation-cap text-sports me-2"></i>Mis Certificaciones
                    </h4>
                    <button class="btn btn-sm btn-outline-success border-sports text-sports fw-semibold px-3"
                        data-bs-toggle="modal" data-bs-target="#modalAltaCertificacion" type="button">
                        <i class="fa-solid fa-plus me-1"></i>Agregar Certificación
                    </button>
                </div>

                <hr class="border-secondary border-opacity-50 mb-4">

                <div class="row g-3" id="contenedor-certificaciones-cards">
                    <div class="col-12 text-center py-5 text-light-50">
                        <div class="spinner-border text-success" role="status"></div>
                        <p class="mt-3 small">Cargando certificaciones...</p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- ============================================================
     MODAL — AGREGAR CERTIFICACIÓN (OSCURO + FILE UPLOAD)
     Sigue guía de estilos: bg blanco solo en modales de edición de datos,
     este modal es de carga de archivo → bg navy (oscuro)
     ============================================================ -->
<div class="modal fade" id="modalAltaCertificacion" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
        <div class="modal-content" style="background-color:#0a2540;border:1px solid rgba(255,255,255,0.1);border-radius:8px;">

            <div class="modal-header border-bottom border-secondary border-opacity-25 pb-3">
                <h6 class="modal-title fw-bold text-uppercase text-sports mb-0">
                    <i class="fa-solid fa-cloud-arrow-up me-2"></i>Registrar Título / Certificado
                </h6>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal"></button>
            </div>

            <form id="form-alta-certificacion" novalidate>
                <div class="modal-body py-3">

                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Nombre de la Certificación <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-nombre" required autocomplete="off"
                            placeholder="Ej: Director Técnico Nacional">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Institución Emisora <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-institucion" required autocomplete="off"
                            placeholder="Ej: AFA / FIFA / Escuela de Técnicos">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small text-light-75 mb-1">Fecha de Emisión <span class="text-danger">*</span></label>
                        <input type="date" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-fecha" required>
                    </div>

                    <div class="mb-1">
                        <label class="form-label small text-light-75 mb-1">
                            Adjuntar Comprobante Digital <span class="text-danger">*</span>
                            <span class="text-light-50 ms-1">(PDF o Imagen)</span>
                        </label>
                        <input type="file" class="form-control bg-football-dark text-white border-secondary shadow-none"
                            id="cert-archivo" accept="image/*,application/pdf" required>
                        <div class="mt-2 px-1">
                            <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,193,7,0.08);border:1px solid rgba(255,193,7,0.25);border-radius:4px;padding:4px 10px;font-size:0.75rem;color:#ffc107;">
                                <i class="fa-solid fa-clock"></i>
                                El certificado quedará pendiente de evaluación por el administrador
                            </span>
                        </div>
                    </div>

                </div>

                <div class="modal-footer border-top border-secondary border-opacity-25 pt-3">
                    <button type="button" class="btn btn-sm btn-secondary px-3"
                        style="background:#70757a;border:none;border-radius:4px;"
                        data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-sm btn-sports-solid px-4">
                        <i class="fa-solid fa-paper-plane me-1"></i>Enviar a Auditoría
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/datosPersonalesEntrenador.js"></script>
</body>
</html>
