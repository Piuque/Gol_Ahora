<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Fecha y Hora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #071524 !important;
        }

        /* Barra de Progreso */
        .stepper-container { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 2rem; }
        .step { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
        .step.completed { background-color: rgba(0, 193, 110, 0.2); color: #00C16E; border: 1px solid #00C16E; }
        .step.active { background-color: #00C16E; color: #071524; box-shadow: 0 0 10px rgba(0, 193, 110, 0.4); }
        .step.inactive { background-color: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        .step-line { height: 2px; width: 30px; background-color: rgba(255, 255, 255, 0.1); }
        .step-line.completed { background-color: #00C16E; }

        .date-picker-dark { background-color: #0A2540; border: 1px solid rgba(0, 193, 110, 0.3); color: #fff; padding: 12px 15px; border-radius: 10px; font-size: 1.1rem; width: 100%; color-scheme: dark; }
        .date-picker-dark:focus { outline: none; border-color: #00C16E; box-shadow: 0 0 10px rgba(0, 193, 110, 0.2); }

        /* Píldoras de Horarios en Bloques Horizontales Completo */
        .hora-pill {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            border-radius: 10px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .hora-pill:not(.disabled):hover {
            background-color: rgba(0, 193, 110, 0.08);
            border-color: rgba(0, 193, 110, 0.4);
            transform: translateX(4px); /* Sutil efecto de empuje hacia la derecha */
        }

        .hora-pill.selected {
            background-color: #00C16E;
            border-color: #00C16E;
            color: #071524;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 193, 110, 0.25);
        }

        /* Estilo limpio para turnos deshabilitados (SIN TACHADO) */
        .hora-pill.disabled {
            background-color: rgba(255, 255, 255, 0.01);
            color: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: default;
        }

        .hora-texto { font-weight: 600; font-size: 1.05rem; }
        .hora-subtexto { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 6px; }

        /* Colores sutiles de fondo para los estados (Premium y limpios) */
        .hora-pill:not(.disabled) .hora-subtexto { background-color: rgba(0, 193, 110, 0.15); color: #00C16E; }
        .hora-pill.selected .hora-subtexto { background-color: rgba(7, 21, 36, 0.2); color: #071524; }

        .hora-pill.disabled.ocupacion-reserva .hora-subtexto { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .hora-pill.disabled.ocupacion-clase .hora-subtexto { background-color: rgba(234, 179, 8, 0.1); color: #eab308; }
        .hora-pill.disabled.ocupacion-mantenimiento .hora-subtexto { background-color: rgba(148, 163, 184, 0.1); color: #94a3b8; }
        .hora-pill.disabled.ocupacion-pasado .hora-subtexto { background-color: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="py-5 px-3">

<div class="container mx-auto" style="max-width: 700px; min-height: 75vh; display: flex; flex-direction: column;">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-50">
        <a href="javascript:window.history.back();" class="fw-bold text-decoration-none text-sports mb-3 mb-md-0">
            <i class="fa-solid fa-arrow-left me-2"></i> Volver
        </a>

        <div class="text-center">
            <h3 class="fw-bold text-white text-uppercase mb-0">
                <i class="fa-regular fa-clock me-2 text-sports"></i>Día y Hora
            </h3>
        </div>

        <div style="width: 180px;" class="d-none d-md-block"></div>
    </div>

    <div class="stepper-container">
        <div class="step completed"><i class="fa-solid fa-check"></i></div>
        <div class="step-line completed"></div>
        <div class="step completed"><i class="fa-solid fa-check"></i></div>
        <div class="step-line completed"></div>
        <div class="step active">3</div>
        <div class="step-line"></div>
        <div class="step inactive">4</div>
    </div>

    <div class="bg-navy p-4 rounded-4 border border-secondary border-opacity-25 shadow-lg flex-grow-1 d-flex flex-column" style="background-color: #0A2540;">

        <div class="mb-4">
            <label class="form-label text-light-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">1. Seleccioná la Fecha</label>
            <input type="date" id="input-fecha" class="date-picker-dark" disabled>
        </div>

        <div class="flex-grow-1">
            <label class="form-label text-light-50 small fw-bold text-uppercase mb-3" style="letter-spacing: 1px;">
                <span>2. Disponibilidad horaria</span>
            </label>

            <div id="contenedor-horarios" class="row g-0 mt-1">
                <div class="col-12 text-center py-4" id="mensaje-inicial">
                    <div class="spinner-border text-sports" role="status"></div>
                    <p class="text-light-50 mt-2 small">Preparando bloques horarios...</p>
                </div>
            </div>
        </div>

        <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 d-none" id="contenedor-continuar">
            <button id="btn-continuar" class="btn btn-sports w-100 py-3 fw-bold fs-5 shadow">
                Ir al Pago Confirmatorio <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/seleccionarFechaHora.js"></script>
</body>
</html>
