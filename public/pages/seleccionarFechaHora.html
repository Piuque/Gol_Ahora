<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Fecha y Hora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #071524 !important;
        }

        /* Barra de Progreso (Pasos 1 y 2 completados, Paso 3 activo) */
        .stepper-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .step.completed {
            background-color: rgba(0, 193, 110, 0.2);
            color: #00C16E;
            border: 1px solid #00C16E;
        }
        .step.active {
            background-color: #00C16E;
            color: #071524;
            box-shadow: 0 0 10px rgba(0, 193, 110, 0.4);
        }
        .step.inactive {
            background-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .step-line { height: 2px; width: 30px; background-color: rgba(255, 255, 255, 0.1); }
        .step-line.completed { background-color: #00C16E; }

        /* Estilo del input de fecha Premium */
        .date-picker-dark {
            background-color: #0A2540;
            border: 1px solid rgba(0, 193, 110, 0.3);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            color-scheme: dark; /* Hace que el calendario nativo sea oscuro */
        }
        .date-picker-dark:focus {
            outline: none;
            border-color: #00C16E;
            box-shadow: 0 0 10px rgba(0, 193, 110, 0.2);
        }

        /* Píldoras de Horarios */
        .hora-pill {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-radius: 8px;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            user-select: none;
        }
        .hora-pill:hover {
            background-color: rgba(0, 193, 110, 0.1);
            border-color: rgba(0, 193, 110, 0.4);
            color: #00C16E;
        }
        .hora-pill.selected {
            background-color: #00C16E;
            border-color: #00C16E;
            color: #071524;
            font-weight: 700;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 193, 110, 0.3);
        }
        .hora-pill.disabled {
            background-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
            text-decoration: line-through;
        }
    </style>
</head>
<body class="py-5 px-3">

<div class="container mx-auto" style="max-width: 800px; min-height: 75vh; display: flex; flex-direction: column;">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-50">
        <a href="javascript:window.history.back();" class="fw-bold text-decoration-none text-sports mb-3 mb-md-0">
            <i class="fa-solid fa-arrow-left me-2"></i> Volver a Canchas
        </a>

        <div class="text-center">
            <h3 class="fw-bold text-white text-uppercase mb-0">
                <i class="fa-regular fa-clock me-2 text-sports"></i>Día y Hora
            </h3>
        </div>

        <div style="width: 180px;" class="d-none d-md-block"></div>
    </div>

    <div class="stepper-container">
        <div class="step completed"><i class="fa-solid fa-check"></i></div>
        <div class="step-line completed"></div>
        <div class="step completed"><i class="fa-solid fa-check"></i></div>
        <div class="step-line completed"></div>
        <div class="step active">3</div>
        <div class="step-line"></div>
        <div class="step inactive">4</div>
    </div>

    <div class="bg-navy p-4 rounded-4 border border-secondary border-opacity-25 shadow-lg flex-grow-1 d-flex flex-column" style="background-color: #0A2540;">

        <div class="mb-4">
            <label class="form-label text-light-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">1. Seleccioná la Fecha</label>
            <input type="date" id="input-fecha" class="date-picker-dark">
        </div>

        <div class="flex-grow-1">
            <label class="form-label text-light-50 small fw-bold text-uppercase d-flex justify-content-between" style="letter-spacing: 1px;">
                <span>2. Horarios Disponibles</span>
                <span id="duracion-reserva" class="text-sports"><i class="fa-solid fa-stopwatch me-1"></i>1 Hora</span>
            </label>

            <div id="contenedor-horarios" class="row g-3 mt-1">
                <div class="col-12 text-center py-4" id="mensaje-inicial">
                    <i class="fa-regular fa-calendar-days fa-3x text-light-50 opacity-50 mb-3"></i>
                    <p class="text-light-50 mb-0">Elegí un día para ver los turnos libres.</p>
                </div>
            </div>
        </div>

        <div class="mt-4 pt-3 border-top border-secondary border-opacity-25 d-none" id="contenedor-continuar">
            <button id="btn-continuar" class="btn btn-sports w-100 py-3 fw-bold fs-5 shadow">
                Ir al Pago Confirmatorio <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/seleccionarFechaHora.js"></script>
</body>
</html>
