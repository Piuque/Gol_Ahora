<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gol Ahora - Perfil Entrenador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-football-dark text-light">

    <div class="d-flex" id="wrapper">
        <!-- SIDEBAR LATERAL -->
        <div class="bg-navy border-end border-secondary border-opacity-25" id="sidebar-wrapper">
            <div class="sidebar-heading text-white fw-bold d-flex align-items-center p-3 border-bottom border-secondary border-opacity-25">
                <i class="fa-solid fa-futbol text-sports me-2"></i> GOL AHORA
            </div>
            <div id="user-profile-summary" class="p-3 border-bottom border-secondary border-opacity-25 bg-dark-navy">
                <div class="d-flex align-items-center">
                    <div class="avatar-box bg-success bg-opacity-25 text-sports rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 40px; height: 40px;"><i class="fa-solid fa-user-gear"></i></div>
                    <div class="overflow-hidden"><div class="fw-bold text-white text-truncate lh-1 small" id="sidebar-user-fullname">Cargando...</div><small class="text-sports text-uppercase fw-bold tracking-wider" style="font-size: 0.65rem;">Entrenador</small></div>
                </div>
            </div>
            <ul class="nav flex-column mt-2" id="sidebar-menu-items">
                <li><a class="nav-link text-white d-flex align-items-center py-2.5 px-3 sidebar-link" href="interfazEntrenador.html"><i class="fa-solid fa-dumbbell me-3"></i>Gestión de Entrenamientos</a></li>
                <li><a class="nav-link text-white d-flex align-items-center py-2.5 px-3 sidebar-link active" href="perfilEntrenador.html"><i class="fa-solid fa-user-gear me-3"></i>Mi Perfil Técnico</a></li>
            </ul>
        </div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column">
            <nav class="navbar navbar-expand-lg navbar-dark bg-navy border-bottom border-secondary border-opacity-25 px-4 py-2">
                <button class="btn btn-outline-success btn-sm border-sports text-sports" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
                <div class="ms-auto"><span class="small text-light-75 fw-medium" id="top-navbar-user-name">Cargando...</span></div>
            </nav>

            <div class="container-fluid px-4 py-4 flex-grow-1">
                <div class="row g-3">
                    <div class="col-lg-8">
                        <div class="p-4 rounded bg-dark-navy border border-secondary border-opacity-25 shadow-sm">
                            <h6 class="text-sports fw-bold mb-3 text-uppercase"><i class="fa-solid fa-id-card me-2"></i>Ficha del Entrenador Matriculado</h6>
                            <form id="form-perfil-tecnico">
                                <div class="row g-2 mb-3">
                                    <div class="col-6"><label class="form-label small text-light-75">Nombre</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Nombre" readonly></div>
                                    <div class="col-6"><label class="form-label small text-light-75">Apellido</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Apellido" readonly></div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-6"><label class="form-label small text-light-75">DNI</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Dni" readonly></div>
                                    <div class="col-6"><label class="form-label small text-light-75">Nacionalidad</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Nacionalidad" readonly></div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-6"><label class="form-label small text-light-75">Género</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Genero" readonly></div>
                                    <div class="col-6"><label class="form-label small text-light-75">Teléfono (Modificable)</label><input type="text" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Telefono"></div>
                                </div>
                                <div class="mb-4"><label class="form-label small text-light-75">Correo Institucional (Modificable)</label><input type="email" class="form-control form-control-sm bg-football-dark border-secondary text-white input-Email"></div>
                                <button type="submit" class="btn btn-sm btn-success px-3 fw-bold"><i class="fa-solid fa-floppy-disk me-1"></i> Modificar datos</button>
                                <button type="button" class="btn btn-sm btn-outline-light px-3 ms-2" onclick="window.print()"><i class="fa-solid fa-print me-1"></i> Imprimir</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="p-4 rounded border border-danger border-opacity-25 bg-dark-navy h-100 d-flex flex-column justify-content-between">
                            <div>
                                <h6 class="text-danger fw-bold text-uppercase mb-2"><i class="fa-solid fa-triangle-exclamation me-2"></i>Solicitar Baja</h6>
                                <p class="text-light-50 small">Si decide desvincular de forma permanente o parcial sus comisiones físicas de entrenamiento, inicie el cese de matrícula.</p>
                            </div>
                            <button class="btn btn-sm btn-outline-danger w-100 fw-bold py-2 mt-3" onclick="solicitarBajaPerfil()"><i class="fa-solid fa-user-xmark me-1"></i> Solicitar baja</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <!-- VINCULACIÓN CORRECTA EN SINGULAR -->
    <script src="js/datosPersonalesEntrenador.js"></script>
</body>
</html>
