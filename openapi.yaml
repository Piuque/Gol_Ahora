      summary: Generar reportes de ingresos (RF-90)
      operationId: adminReporteIngresos
      parameters:
        - name: fechaInicio
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: fechaFin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Reporte financiero generado

  /admin/reportes/reservas:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Generar reportes de reservas (RF-91)
      operationId: adminReporteReservas
      parameters:
        - name: mes
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Reporte de reservas generado

  /admin/reportes/asistencia-clases:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Generar reportes de asistencia a clases (RF-92)
      operationId: adminReporteAsistenciaClases
      responses:
        '200':
          description: Reporte de asistencia generado

  /admin/reportes/asistencia-entrenamientos:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Generar reportes de asistencia a entrenamientos (RF-93)
      operationId: adminReporteAsistenciaEntrenamientos
      responses:
        '200':
          description: Reporte de asistencia generado

components:
  schemas:
    Cliente:
      type: object
      properties:
        id_usuario:
          type: integer
        username:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        fecha_registro:
          type: string
          format: date-time
      required:
        - id_usuario
        - username
        - nombre
        - email

    ClienteEntrada:
      type: object
      properties:
        username:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        dni:
          type: string
        telefono:
          type: string
        fecha_nacimiento:
          type: string
          format: date
      required:
        - nombre
        - apellido
        - email

    Profesor:
      type: object
      properties:
        id_usuario:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        certificaciones:
          type: array
          items:
            $ref: '#/components/schemas/Certificacion'
      required:
        - id_usuario
        - nombre
        - certificaciones

    ProfesorEntrada:
      type: object
      properties:
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        telefono:
          type: string
        certificacionesIniciales:
          type: array
          items:
            $ref: '#/components/schemas/CertificacionEntrada'
      required:
        - nombre
        - apellido
        - email

    Entrenador:
      type: object
      properties:
        id_usuario:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        certificaciones:
          type: array
          items:
            $ref: '#/components/schemas/Certificacion'
      required:
        - id_usuario
        - nombre
        - certificaciones

    EntrenadorEntrada:
      type: object
      properties:
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
        telefono:
          type: string
        certificacionesIniciales:
          type: array
          items:
            $ref: '#/components/schemas/CertificacionEntrada'
      required:
        - nombre
        - apellido
        - email

    Certificacion:
      type: object
      properties:
        id_certificacion:
          type: integer
        matricula:
          type: string
        fecha_caducidad:
          type: string
          format: date
        link_archivo:
          type: string
      required:
        - id_certificacion
        - matricula
        - link_archivo

    CertificacionEntrada:
      type: object
      properties:
        matricula:
          type: string
        fecha_caducidad:
          type: string
          format: date
        link_archivo:
          type: string
      required:
        - matricula
        - link_archivo

    TipoCancha:
      type: object
      properties:
        id_tipo_de_cancha:
          type: integer
        tipo_cancha:
          type: string
          description: Ej. Fútbol 5, Fútbol 7, Fútbol 11
        ancho:
          type: number
        largo:
          type: number
        capacidad:
          type: integer
        duracion_max:
          type: integer
      required:
        - id_tipo_de_cancha
        - tipo_cancha
        - capacidad

    TipoCanchaEntrada:
      type: object
      properties:
        tipo_cancha:
          type: string
        ancho:
          type: number
        largo:
          type: number
        capacidad:
          type: integer
        duracion_min:
          type: integer
        duracion_max:
          type: integer
        id_superficie:
          type: integer
      required:
        - tipo_cancha
        - capacidad
        - id_superficie

    Cancha:
      type: object
      properties:
        id_cancha:
          type: integer
        nombre:
          type: string
        precio_hora_reserva:
          type: number
        id_tipo_de_cancha:
          type: integer
      required:
        - id_cancha
        - nombre
        - id_tipo_de_cancha

    CanchaEntrada:
      type: object
      properties:
        nombre:
          type: string
        tiempo_cancelacion:
          type: integer
        precio_hora_reserva:
          type: number
        id_tipo_de_cancha:
          type: integer
      required:
        - nombre
        - precio_hora_reserva
        - id_tipo_de_cancha

    DisponibilidadCancha:
      type: object
      properties:
        id_cancha:
          type: integer
        nombreCancha:
          type: string
        fecha:
          type: string
          format: date
        franjasHorarias:
          type: array
          items:
            $ref: '#/components/schemas/FranjaHoraria'
      required:
        - id_cancha
        - franjasHorarias

    FranjaHoraria:
      type: object
      properties:
        horaInicio:
          type: string
          example: "18:00"
        horaFin:
          type: string
          example: "19:00"
        estado:
          type: string
          enum: [DISPONIBLE, RESERVADO, MANTENIMIENTO]
      required:
        - horaInicio
        - horaFin
        - estado

    CalendarioDisponibilidad:
      type: object
      properties:
        id_cancha:
          type: integer
        diasSemana:
          type: array
          items:
            $ref: '#/components/schemas/HorarioDia'

    CalendarioDisponibilidadEntrada:
      type: object
      properties:
        diasSemana:
          type: array
          items:
            $ref: '#/components/schemas/HorarioDia'
      required:
        - diasSemana

    HorarioDia:
      type: object
      properties:
        dia:
          type: string
          enum: [Lunes, Martes, Miércoles, Jueves, Viernes, Sábado, Domingo]
        hora_inicio:
          type: string
          example: "08:00"
        hora_fin:
          type: string
          example: "23:00"
      required:
        - dia
        - hora_inicio
        - hora_fin

    BloqueoCancha:
      type: object
      properties:
        id_ocupacion_cancha:
          type: integer
        id_cancha:
          type: integer
        fecha:
          type: string
          format: date
        hora_inicio:
          type: string
        hora_fin:
          type: string
        motivo:
          type: string
      required:
        - id_ocupacion_cancha
        - id_cancha

    BloqueoCanchaEntrada:
      type: object
      properties:
        fecha:
          type: string
          format: date
        hora_inicio:
          type: string
        hora_fin:
          type: string
        motivo:
          type: string
      required:
        - fecha
        - hora_inicio
        - hora_fin
        - motivo

    Descuento:
      type: object
      properties:
        id_descuento:
          type: integer
        descripcion:
          type: string
        porcentaje_descuento:
          type: number
        activo:
          type: boolean
      required:
        - id_descuento
        - descripcion
        - porcentaje_descuento

    DescuentoEntrada:
      type: object
      properties:
        descripcion:
          type: string
        porcentaje_descuento:
          type: number
        activo:
          type: boolean
      required:
        - descripcion
        - porcentaje_descuento

    Cobro:
      type: object
      properties:
        id_cobro:
          type: integer
        monto:
          type: number
        porcentaje_descuento:
          type: number
        detalles:
          type: string
        estado:
          type: string
          enum: [Pendiente, Pagado, Cancelado]
      required:
        - id_cobro
        - monto
        - estado

    CobroEntrada:
      type: object
      properties:
        idCliente:
          type: integer
        monto:
          type: number
        detalles:
          type: string
        idMetodoPago:
          type: integer
      required:
        - idCliente
        - monto
        - idMetodoPago

    Recibo:
      type: object
      properties:
        id_recibos:
          type: integer
        nro_transaccion:
          type: string
        detalles:
          type: string
        fecha:
          type: string
          format: date-time
        id_cobro:
          type: integer
      required:
        - id_recibos
        - nro_transaccion
        - id_cobro

    ReciboEntrada:
      type: object
      properties:
        id_cobro:
          type: integer
        nro_transaccion:
          type: string
        detalles:
          type: string
      required:
        - id_cobro
        - nro_transaccion

    Reserva:
      type: object
      properties:
        id_reserva:
          type: integer
        id_usuario:
          type: integer
        id_cancha:
          type: integer
        id_cobro:
          type: integer
        estado:
          type: string
          enum: [PENDIENTE, CONFIRMADA, CANCELADA]
      required:
        - id_reserva
        - id_usuario
        - id_cancha
        - id_cobro

    ReservaEntrada:
      type: object
      properties:
        idCliente:
          type: integer
        idCancha:
          type: integer
        fecha:
          type: string
          format: date
        horaInicio:
          type: string
        horaFin:
          type: string
      required:
        - idCliente
        - idCancha
        - fecha
        - horaInicio
        - horaFin

    ResultadoCancelacionReserva:
      type: object
      properties:
        id_reserva:
          type: integer
        estado:
          type: string
          example: "CANCELADA"
        montoReembolso:
          type: number
        cargoPenalizacion:
          type: number
          mensaje:
            type: string
      required:
        - id_reserva
        - estado

    Liga:
      type: object
      properties:
        id_liga:
          type: integer
        nombre:
          type: string
        fecha_inicio:
          type: string
          format: date
        fecha_fin:
          type: string
          format: date
      required:
        - id_liga
        - nombre

    LigaEntrada:
      type: object
      properties:
        nombre:
          type: string
        fecha_inicio:
          type: string
          format: date
        fecha_fin:
          type: string
          format: date
        idUsuarioTutor:
          type: integer
      required:
        - nombre
        - fecha_inicio
        - fecha_fin
        - idUsuarioTutor

    Torneo:
      type: object
      properties:
        id_torneo:
          type: integer
        nombre:
          type: string
        fecha_inicio:
          type: string
          format: date
        fecha_fin:
          type: string
          format: date
      required:
        - id_torneo
        - nombre

    TorneoEntrada:
      type: object
      properties:
        nombre:
          type: string
        fecha_inicio:
          type: string
          format: date
        fecha_fin:
          type: string
          format: date
        idUsuarioTutor:
          type: integer
      required:
        - nombre
        - fecha_inicio
        - fecha_fin
        - idUsuarioTutor

    Partido:
      type: object
      properties:
        id_partido:
          type: integer
        fecha_hora:
          type: string
          format: date-time
        goles_local:
          type: integer
        goles_visitante:
          type: integer
        id_equipo_local:
          type: integer
        id_equipo_visitante:
          type: integer
        estado:
          type: string
      required:
        - id_partido
        - id_equipo_local
        - id_equipo_visitante
        - fecha_hora

    ResultadoPartidoEntrada:
      type: object
      properties:
        goles_local:
          type: integer
        goles_visitante:
          type: integer
      required:
        - goles_local
        - goles_visitante

    Inscripcion:
      type: object
      properties:
        id_inscripcion:
          type: integer
        id_competencia:
          type: integer
        id_participante:
          type: integer
      required:
        - id_inscripcion
        - id_competencia
        - id_participante

    CuadroTorneo:
      type: object
      properties:
        id_torneo:
          type: integer
        rondas:
          type: array
          items:
            $ref: '#/components/schemas/RondaCuadro'

    RondaCuadro:
      type: object
      properties:
        numeroRonda:
          type: integer
        nombreRonda:
          type: string
          example: "Semifinal"
        partidos:
          type: array
          items:
            $ref: '#/components/schemas/Partido'

    Clase:
      type: object
      properties:
        id_clase:
          type: integer
        nombre:
          type: string
        id_profesional:
          type: integer
        capacidad_max:
          type: integer
      required:
        - id_clase
        - nombre
        - id_profesional

    ClaseEntrada:
      type: object
      properties:
        nombre:
          type: string
        capacidad_max:
          type: integer
        id_profesional:
          type: integer
        id_cancha:
          type: integer
        fecha:
          type: string
          format: date
        hora_inicio:
          type: string
        hora_fin:
          type: string
      required:
        - nombre
        - capacidad_max
        - id_profesional
        - id_cancha

    Entrenamiento:
      type: object
      properties:
        id_entrenamiento:
          type: integer
        id_profesional:
          type: integer
        capacidad_max:
          type: integer
      required:
        - id_entrenamiento
        - id_profesional

    EntrenamientoEntrada:
      type: object
      properties:
        capacidad_max:
          type: integer
        id_profesional:
          type: integer
        id_cancha:
          type: integer
        fecha:
          type: string
          format: date
        hora_inicio:
          type: string
        hora_fin:
          type: string
      required:
        - capacidad_max
        - id_profesional
        - id_cancha

    AsignacionParticular:
      type: object
      properties:
        id_asignacion:
          type: integer
        id_cliente:
          type: integer
        id_profesional:
          type: integer
        tipo:
          type: string
          enum: [CLASE_PARTICULAR, ENTRENAMIENTO_PARTICULAR]
      required:
        - id_asignacion
        - id_cliente
        - id_profesional

    AsignacionProfesorParticularEntrada:
      type: object
      properties:
        idCliente:
          type: integer
        idProfesor:
          type: integer
        fecha:
          type: string
          format: date
        horaInicio:
          type: string
        horaFin:
          type: string
      required:
        - idCliente
        - idProfesor
        - fecha
        - horaInicio
        - horaFin

    AsignacionEntrenadorParticularEntrada:
      type: object
      properties:
        idCliente:
          type: integer
        idEntrenador:
          type: integer
        fecha:
          type: string
          format: date
        horaInicio:
          type: string
        horaFin:
          type: string
      required:
        - idCliente
        - idEntrenador
        - fecha
        - horaInicio
        - horaFin

    AsistenciaEntrada:
      type: object
      properties:
        fecha:
          type: string
          format: date
        alumnos:
          type: array
          items:
            $ref: '#/components/schemas/AsistenciaAlumnoEntrada'
      required:
        - fecha
        - alumnos

    AsistenciaAlumnoEntrada:
      type: object
      properties:
        idUsuario:
          type: integer
        asistio:
          type: boolean
      required:
        - idUsuario
        - asistio

    ListaAsistencia:
      type: object
      properties:
        id_asistencia:
          type: integer
        id_actividad:
          type: integer
        fecha:
          type: string
          format: date
        registros:
          type: array
          items:
            $ref: '#/components/schemas/RegistroAsistencia'

    RegistroAsistencia:
      type: object
      properties:
        idUsuario:
          type: integer
        nombreUsuario:
          type: string
        asistio:
          type: boolean
      required:
        - idUsuario
        - asistio

    DatosReporte:
      type: object
      properties:
        tipoReporte:
          type: string
        fechaGeneracion:
          type: string
          format: date-time
        resumen:
          type: object
        datos:
          type: array
          items:
            type: object
      required:
        - tipoReporte
        - fechaGeneracion
        - datos
