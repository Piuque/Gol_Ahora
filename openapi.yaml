openapi: 3.0.0
info:
  title: Gol Ahora - API de Gestión
  description: |
    API de gestión y automatización de procesos de administración, alquiler de canchas y actividades del complejo deportivo **"El buen deporte"**.
    
    ### Reglas de Negocio Incorporadas:
    1. **Confirmación de Reserva**: Solo se confirman reservas cuyo pago esté completamente validado. No se permiten reservas pendientes.
    2. **Duración de Reservas**: Duración máxima por tipo de cancha: Fútbol 5 (1 hora), Fútbol 7 (1.5 horas), Fútbol 11 (2 horas).
    3. **Políticas de Cancelación**: Plazo mínimo de 6 horas de antelación. Si se realiza fuera de plazo, se aplica cargo/pérdida total del pago.
    4. **Ventana de Reserva**: Antelación máxima de 30 días calendario.
    5. **Certificaciones**: Profesores y entrenadores deben poseer certificación deportiva válida verificada en el sistema.
    6. **Límite de Alumnos**: Capacidad máxima configurable por clase/entrenamiento grupal según tipo de cancha.
    7. **Bloqueo por Mantenimiento**: Permite inhabilitar canchas para impedir reservas en horarios específicos.
    8. **Reglas Deportivas**: Liga y torneos se rigen por reglas FIFA y reglamentos internos.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de desarrollo local
tags:
  - name: Clientes
    description: Registro y gestión de clientes del complejo (RF-01 a RF-06)
  - name: Profesores
    description: Administración de profesores y sus certificaciones (RF-07 a RF-13)
  - name: Entrenadores
    description: Administración de entrenadores y sus certificaciones (RF-14 a RF-20)
  - name: Tipos de Cancha
    description: Gestión de tipos de canchas (Fútbol 5, 7, 11, etc.) y características (RF-21 a RF-25)
  - name: Canchas
    description: Administración de canchas físicas, disponibilidad y bloqueos por mantenimiento (RF-26 a RF-33)
  - name: Descuentos
    description: Gestión y aplicación de descuentos configurables (RF-34 a RF-38)
  - name: Cobros
    description: Registro y procesamiento de cobros de servicios y alquileres (RF-45 a RF-51)
  - name: Recibos
    description: Gestión de comprobantes y recibos de pago (RF-39 a RF-44)
  - name: Reservas
    description: Procesamiento de reservas de canchas y políticas asociadas (RF-52 a RF-56)
  - name: Ligas
    description: Organización, fixtures, inscripciones y resultados de ligas (RF-57 a RF-64)
  - name: Torneos
    description: Organización, cuadros (brackets), inscripciones y resultados de torneos (RF-65 a RF-72)
  - name: Clases
    description: Programación de clases, asignación de profesores particulares y asistencias (RF-73 a RF-79)
  - name: Entrenamientos
    description: Programación de entrenamientos, entrenadores particulares, inscripciones y asistencias (RF-80 a RF-88)
  - name: Reportes
    description: Generación de reportes estadísticos, ingresos y asistencias (RF-89 a RF-93)

paths:
  # === GESTIÓN DE CLIENTES ===
  /clientes:
    post:
      tags:
        - Clientes
      summary: Registrar datos de un nuevo cliente (RF-01)
      operationId: registrarCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteEntrada'
      responses:
        '201':
          description: Cliente registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '400':
          description: Datos inválidos
    get:
      tags:
        - Clientes
      summary: Listar a los clientes (RF-02)
      description: Devuelve una lista de clientes con soporte para búsqueda y paginación.
      operationId: listarClientes
      parameters:
        - name: busqueda
          in: query
          description: Filtrar por nombre, email o teléfono
          required: false
          schema:
            type: string
        - name: limite
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cliente'

  /clientes/{id}:
    get:
      tags:
        - Clientes
      summary: Consultar los datos de un cliente (RF-03)
      operationId: obtenerCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '404':
          description: Cliente no encontrado
    put:
      tags:
        - Clientes
      summary: Modificar los datos de un cliente (RF-04)
      operationId: actualizarCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteEntrada'
      responses:
        '200':
          description: Cliente actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '404':
          description: Cliente no encontrado
    delete:
      tags:
        - Clientes
      summary: Eliminar los datos de un cliente (RF-05)
      operationId: eliminarCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Cliente eliminado exitosamente
        '404':
          description: Cliente no encontrado

  /clientes/{id}/imprimir:
    get:
      tags:
        - Clientes
      summary: Obtener archivo imprimible de los datos del cliente (RF-06)
      description: Genera y devuelve un PDF con la ficha del cliente.
      operationId: imprimirCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ficha en formato PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # === GESTIÓN DE PROFESORES ===
  /profesores:
    post:
      tags:
        - Profesores
      summary: Registrar datos de un profesor y sus certificaciones (RF-07, RF-13)
      operationId: registrarProfesor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfesorEntrada'
      responses:
        '201':
          description: Profesor registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profesor'
        '400':
          description: Falta la certificación deportiva obligatoria o datos inválidos
    get:
      tags:
        - Profesores
      summary: Listar a los profesores (RF-08)
      operationId: listarProfesores
      responses:
        '200':
          description: Lista de profesores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profesor'

  /profesores/{id}:
    get:
      tags:
        - Profesores
      summary: Consultar los datos de un profesor (RF-09)
      operationId: obtenerProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del profesor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profesor'
        '404':
          description: Profesor no encontrado
    put:
      tags:
        - Profesores
      summary: Modificar los datos de un profesor (RF-10)
      operationId: actualizarProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfesorEntrada'
      responses:
        '200':
          description: Profesor actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profesor'
    delete:
      tags:
        - Profesores
      summary: Eliminar los datos de un profesor (RF-11)
      operationId: eliminarProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Profesor eliminado exitosamente

  /profesores/{id}/imprimir:
    get:
      tags:
        - Profesores
      summary: Obtener archivo imprimible de los datos del profesor (RF-12)
      operationId: imprimirProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ficha en formato PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /profesores/{id}/certificaciones:
    post:
      tags:
        - Profesores
      summary: Registrar nuevas certificaciones del profesor (RF-13)
      operationId: agregarCertificacionProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionEntrada'
      responses:
        '201':
          description: Certificación registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificacion'

  # === GESTIÓN DE ENTRENADORES ===
  /entrenadores:
    post:
      tags:
        - Entrenadores
      summary: Registrar datos de un entrenador y sus certificaciones (RF-14, RF-20)
      operationId: registrarEntrenador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrenadorEntrada'
      responses:
        '201':
          description: Entrenador registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrenador'
        '400':
          description: Falta la certificación deportiva obligatoria o datos inválidos
    get:
      tags:
        - Entrenadores
      summary: Listar a los entrenadores (RF-15)
      operationId: listarEntrenadores
      responses:
        '200':
          description: Lista de entrenadores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entrenador'

  /entrenadores/{id}:
    get:
      tags:
        - Entrenadores
      summary: Consultar los datos de un entrenador (RF-16)
      operationId: obtenerEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del entrenador
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrenador'
    put:
      tags:
        - Entrenadores
      summary: Modificar los datos de un entrenador (RF-17)
      operationId: actualizarEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrenadorEntrada'
      responses:
        '200':
          description: Entrenador modificado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entrenador'
    delete:
      tags:
        - Entrenadores
      summary: Eliminar los datos de un entrenador (RF-18)
      operationId: eliminarEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Entrenador eliminado exitosamente

  /entrenadores/{id}/imprimir:
    get:
      tags:
        - Entrenadores
      summary: Obtener archivo imprimible de los datos del entrenador (RF-19)
      operationId: imprimirEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ficha en formato PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /entrenadores/{id}/certificaciones:
    post:
      tags:
        - Entrenadores
      summary: Registrar nuevas certificaciones del entrenador (RF-20)
      operationId: agregarCertificacionEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionEntrada'
      responses:
        '201':
          description: Certificación registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificacion'

  # === GESTIÓN DE TIPOS DE CANCHA ===
  /tipos-cancha:
    post:
      tags:
        - Tipos de Cancha
      summary: Registrar un tipo de cancha y sus características (RF-21)
      description: Crea un nuevo tipo de cancha (ej. Fútbol 5, Fútbol 7, Fútbol 11) estableciendo superficie, capacidad y duración máxima permitida.
      operationId: registrarTipoCancha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TipoCanchaEntrada'
      responses:
        '201':
          description: Tipo de cancha registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TipoCancha'
    get:
      tags:
        - Tipos de Cancha
      summary: Listar los tipos de canchas y sus características (RF-22)
      operationId: listarTiposCancha
      responses:
        '200':
          description: Lista de tipos de cancha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TipoCancha'

  /tipos-cancha/{id}:
    get:
      tags:
        - Tipos de Cancha
      summary: Consultar un tipo de cancha específico (RF-23)
      operationId: obtenerTipoCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Características del tipo de cancha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TipoCancha'
    put:
      tags:
        - Tipos de Cancha
      summary: Modificar las características de un tipo de cancha (RF-24)
      operationId: actualizarTipoCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TipoCanchaEntrada'
      responses:
        '200':
          description: Tipo de cancha modificado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TipoCancha'
    delete:
      tags:
        - Tipos de Cancha
      summary: Eliminar un tipo de cancha (RF-25)
      operationId: eliminarTipoCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Tipo de cancha eliminado

  # === GESTIÓN DE CANCHAS ===
  /canchas:
    post:
      tags:
        - Canchas
      summary: Registrar una cancha física asociada a un tipo (RF-26)
      operationId: registrarCancha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanchaEntrada'
      responses:
        '201':
          description: Cancha física creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cancha'
    get:
      tags:
        - Canchas
      summary: Listar canchas del complejo (RF-27)
      operationId: listarCanchas
      parameters:
        - name: idTipoCancha
          in: query
          description: Filtrar por identificador de tipo de cancha
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de canchas registradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cancha'

  /canchas/{id}:
    get:
      tags:
        - Canchas
      summary: Consultar los datos de una cancha específica (RF-28)
      operationId: obtenerCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos de la cancha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cancha'
    put:
      tags:
        - Canchas
      summary: Modificar una cancha (RF-29)
      operationId: actualizarCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanchaEntrada'
      responses:
        '200':
          description: Cancha modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cancha'
    delete:
      tags:
        - Canchas
      summary: Eliminar una cancha (RF-30)
      operationId: eliminarCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Cancha eliminada

  /canchas/disponibilidad:
    get:
      tags:
        - Canchas
      summary: Consultar la disponibilidad de canchas (RF-31)
      description: Devuelve las franjas horarias disponibles para una fecha específica, permitiendo filtrar por tipo de cancha.
      operationId: consultarDisponibilidad
      parameters:
        - name: fecha
          in: query
          required: true
          description: Fecha a consultar (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: idTipoCancha
          in: query
          required: false
          description: ID de tipo de cancha a buscar
          schema:
            type: string
      responses:
        '200':
          description: Estado de disponibilidad de las canchas para el día
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisponibilidadCancha'

  /canchas/{id}/disponibilidad:
    put:
      tags:
        - Canchas
      summary: Modificar la disponibilidad horaria de una cancha (RF-32)
      description: Permite definir el calendario de apertura, horarios y disponibilidad estándar semanal o por fecha.
      operationId: actualizarDisponibilidadCancha
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarioDisponibilidadEntrada'
      responses:
        '200':
          description: Horarios de disponibilidad actualizados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarioDisponibilidad'

  /canchas/{id}/bloqueos:
    post:
      tags:
        - Canchas
      summary: Bloquear cancha para tareas de mantenimiento u otros motivos (RF-33)
      description: Impide que los usuarios reserven la cancha en las fechas y horarios indicados.
      operationId: bloquearCanchaMantenimiento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BloqueoCanchaEntrada'
      responses:
        '201':
          description: Cancha bloqueada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BloqueoCancha'
        '400':
          description: La cancha ya tiene reservas confirmadas en ese horario

  # === GESTIÓN DE DESCUENTOS ===
  /descuentos:
    post:
      tags:
        - Descuentos
      summary: Registrar configuraciones de descuentos (RF-34)
      description: Creación de políticas de descuentos aplicables por el personal de Gol Ahora (paquetes de horas, escuelas asociadas, ligas).
      operationId: registrarDescuento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescuentoEntrada'
      responses:
        '201':
          description: Descuento configurado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Descuento'
    get:
      tags:
        - Descuentos
      summary: Listar descuentos (RF-35)
      operationId: listarDescuentos
      responses:
        '200':
          description: Lista de descuentos activos e inactivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Descuento'

  /descuentos/{id}:
    get:
      tags:
        - Descuentos
      summary: Consultar descuento específico (RF-36)
      operationId: obtenerDescuento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del descuento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Descuento'
    put:
      tags:
        - Descuentos
      summary: Modificar descuento (RF-37)
      operationId: actualizarDescuento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescuentoEntrada'
      responses:
        '200':
          description: Descuento actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Descuento'
    delete:
      tags:
        - Descuentos
      summary: Eliminar descuento (RF-38)
      operationId: eliminarDescuento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Descuento eliminado

  # === GESTIÓN DE COBROS ===
  /cobros:
    post:
      tags:
        - Cobros
      summary: Registrar un cobro por servicios (RF-45)
      description: Genera una solicitud de pago por alquiler de canchas, inscripciones a ligas/torneos, clases, etc.
      operationId: registrarCobro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CobroEntrada'
      responses:
        '201':
          description: Cobro creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cobro'
    get:
      tags:
        - Cobros
      summary: Listar cobros por servicios (RF-46)
      operationId: listarCobros
      parameters:
        - name: idCliente
          in: query
          required: false
          schema:
            type: string
        - name: estado
          in: query
          required: false
          schema:
            type: string
            enum: [PENDIENTE, PAGADO, CANCELADO]
      responses:
        '200':
          description: Lista de cobros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cobro'

  /cobros/{id}:
    get:
      tags:
        - Cobros
      summary: Consultar un cobro por servicios (RF-47)
      operationId: obtenerCobro
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del cobro
          content:
            application/json:
