openapi: 3.0.0
info:
  title: Gol Ahora - API de Gestión
  description: |
    API de gestión y automatización de procesos de administración, alquiler de canchas y actividades del complejo deportivo **"El buen deporte"**.
    
    ### Niveles de Acceso y Roles:
    1. **Usuario (Público - Visitante no registrado)**: Puede registrarse, listar canchas/tipos, ver la disponibilidad de horarios y ver la oferta pública de clases y entrenamientos.
    2. **Cliente (Registrado)**: Deportista con cuenta. Puede gestionar su perfil, realizar, modificar y cancelar reservas (previo pago), e inscribirse o darse de baja en clases y entrenamientos grupales o particulares. Solo consulta su propia facturación (cobros/recibos). No participa directamente en la creación ni inscripción de ligas/torneos.
    3. **Administrador (Personal/Staff del club)**: Empleados y coordinadores. Tienen el control total de la gestión de clientes, profesores/entrenadores (certificaciones), canchas físicas (mantenimiento y horarios), políticas de descuentos, cobros globales, organización de ligas y torneos (inscripción de equipos, generación de fixtures, brackets y resultados de partidos) y generación de reportes financieros y de asistencia.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor de desarrollo local
tags:
  - name: 1. Acceso Usuario (Público)
    description: Endpoints públicos generales para visitantes no registrados
  - name: 2. Acceso Cliente (Registrado)
    description: Endpoints privados para deportistas registrados (Reservas, Clases, Finanzas propias)
  - name: 3. Acceso Administrador (Personal)
    description: Endpoints operativos y de gestión exclusiva para el personal del club

paths:
  # ==========================================
  # === 1. ACCESO USUARIO (PÚBLICO) ===
  # ==========================================
  /usuario/registro:
    post:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Registrarse como nuevo cliente en el sistema (RF-01)
      operationId: registrarNuevoUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteEntrada'
      responses:
        '201':
          description: Cliente registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '400':
          description: Datos inválidos o duplicados (DNI/Username/Email ya registrados)

  /usuario/canchas:
    get:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Listar canchas del complejo con características (RF-27)
      operationId: listarCanchasPublicas
      parameters:
        - name: idTipoCancha
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de canchas físicas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cancha'

  /usuario/tipos-cancha:
    get:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Listar los tipos de canchas y sus características (RF-22)
      operationId: listarTiposCanchaPublicos
      responses:
        '200':
          description: Lista de tipos de canchas (Fútbol 5, 7, 11)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TipoCancha'

  /usuario/canchas/disponibilidad:
    get:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Consultar la disponibilidad horaria general de las canchas (RF-31)
      operationId: consultarDisponibilidadPublica
      parameters:
        - name: fecha
          in: query
          required: true
          description: Fecha a consultar (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: idTipoCancha
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Horarios de disponibilidad por cancha
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisponibilidadCancha'

  /usuario/clases:
    get:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Consultar la oferta general de clases programadas (RF-74)
      operationId: listarClasesPublicas
      responses:
        '200':
          description: Lista de clases ofrecidas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Clase'

  /usuario/entrenamientos:
    get:
      tags:
        - 1. Acceso Usuario (Público)
      summary: Consultar la oferta general de entrenamientos programados (RF-81)
      operationId: listarEntrenamientosPublicos
      responses:
        '200':
          description: Lista de entrenamientos grupales ofrecidos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entrenamiento'

  # ==========================================
  # === 2. ACCESO CLIENTE (REGISTRADO) ===
  # ==========================================
  /cliente/perfil:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Consultar sus datos personales (RF-03)
      operationId: obtenerPerfilCliente
      responses:
        '200':
          description: Datos del cliente logueado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
    put:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Modificar sus propios datos de perfil (RF-04)
      operationId: modificarPerfilCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteEntrada'
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'

  /cliente/canchas:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Listar e investigar características de canchas físicas para reservar (RF-27)
      operationId: listarCanchasCliente
      parameters:
        - name: idTipoCancha
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de canchas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cancha'

  /cliente/reservas:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Realizar la reserva de una cancha (RF-52)
      description: |
        Registra una reserva. Reglas de negocio:
        - Ventana máxima de 30 días de antelación.
        - Duración máxima según el tipo (Fútbol 5: 1h, Fútbol 7: 1.5h, Fútbol 11: 2h).
        - La reserva requiere validación del pago completo asociado para confirmarse.
      operationId: crearReservaCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaEntrada'
      responses:
        '201':
          description: Reserva guardada (Estado PENDIENTE hasta confirmar pago)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          description: Error en las validaciones de políticas del club
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Listar sus propias reservas (RF-53)
      operationId: listarMisReservas
      responses:
        '200':
          description: Lista de reservas del cliente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reserva'

  /cliente/reservas/{id}:
    put:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Modificar reserva (cambiar horario o cancha) (RF-55)
      operationId: modificarReservaCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaEntrada'
      responses:
        '200':
          description: Reserva modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'

  /cliente/reservas/{id}/cancelar:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Cancelar una reserva activa (RF-56)
      description: |
        Cancela la reserva propia.
        - Más de 6 horas antes: Reembolso procesado.
        - Menos de 6 horas antes: Aplica penalización o pérdida del pago.
      operationId: cancelarReservaCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reserva cancelada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultadoCancelacionReserva'

  /cliente/clases:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: "Listar sus clases (2 listados: Oferta disponible y Clases contratadas/particulares) (RF-74)"
      operationId: listarMisClases
      parameters:
        - name: tipo
          in: query
          required: false
          description: Filtrar por 'DISPONIBLE' o 'CONTRATADA'
          schema:
            type: string
      responses:
        '200':
          description: Listado de clases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Clase'

  /cliente/clases/inscripcion:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Inscribirse a una clase particular o grupal (RF-78)
      operationId: inscribirAClaseCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignacionProfesorParticularEntrada'
      responses:
        '201':
          description: Inscripción registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignacionParticular'

  /cliente/clases/inscripcion/{id}:
    delete:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Darse de baja de una clase (cancelar inscripción) (RF-77)
      operationId: darDeBajaClaseCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Baja procesada exitosamente

  /cliente/entrenamientos:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: "Listar sus entrenamientos (2 listados: Oferta disponible y Entrenamientos inscritos/particulares) (RF-81)"
      operationId: listarMisEntrenamientos
      parameters:
        - name: tipo
          in: query
          required: false
          description: Filtrar por 'DISPONIBLE' o 'INSCRITO'
          schema:
            type: string
      responses:
        '200':
          description: Listado de entrenamientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entrenamiento'

  /cliente/entrenamientos/inscripcion:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Inscribirse a un entrenamiento particular o grupal (RF-87)
      operationId: inscribirAEntrenamientoCliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignacionEntrenadorParticularEntrada'
      responses:
        '201':
          description: Inscrito al entrenamiento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignacionParticular'

  /cliente/entrenamientos/inscripcion/{id}:
    delete:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Darse de baja (cancelar inscripción) de un entrenamiento (RF-88)
      operationId: darDeBajaEntrenamientoCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Cancelación de inscripción procesada

  /cliente/clases/pago:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Realizar pago por servicio/inscripción de clase (RF-39, RF-45)
      operationId: realizarPagoClase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReciboEntrada'
      responses:
        '201':
          description: Recibo generado al realizar pago
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recibo'

  /cliente/entrenamientos/pago:
    post:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Realizar pago por servicio/inscripción de entrenamiento (RF-39, RF-45)
      operationId: realizarPagoEntrenamiento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReciboEntrada'
      responses:
        '201':
          description: Recibo emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recibo'

  /cliente/cobros:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Listar sus cobros/pagos registrados (RF-46)
      operationId: listarMisCobros
      responses:
        '200':
          description: Lista de cobros personales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cobro'

  /cliente/cobros/{id}:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Consultar datos de un cobro propio específico (RF-47)
      operationId: obtenerMiCobro
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del cobro personal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cobro'

  /cliente/recibos:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Listar sus recibos de pago (RF-40)
      operationId: listarMisRecibos
      responses:
        '200':
          description: Lista de recibos personales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recibo'

  /cliente/recibos/{id}:
    get:
      tags:
        - 2. Acceso Cliente (Registrado)
      summary: Consultar un recibo propio específico (RF-41)
      operationId: obtenerMiRecibo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalle del recibo de pago personal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recibo'

  # ==========================================
  # === 3. ACCESO ADMINISTRADOR (PERSONAL) ===
  # ==========================================
  /admin/clientes:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Listar los clientes del complejo (RF-02)
      operationId: adminListarClientes
      responses:
        '200':
          description: Lista de clientes registrados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cliente'

  /admin/clientes/{id}:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Consultar los datos de un cliente (RF-03)
      operationId: adminObtenerCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ficha del cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
    put:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Modificar los datos de un cliente (RF-04)
      operationId: adminActualizarCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteEntrada'
      responses:
        '200':
          description: Ficha modificada
    delete:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Eliminar los datos de un cliente (RF-05)
      operationId: adminEliminarCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Cliente dado de baja del sistema

  /admin/clientes/{id}/imprimir:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Generar ficha de cliente para imprimir (RF-06)
      operationId: adminImprimirCliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF de ficha de cliente
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # --- PROFESORES Y ENTRENADORES ---
  /admin/profesores:
    post:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Registrar datos de un profesor y sus certificaciones (RF-07, RF-13)
      operationId: adminRegistrarProfesor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfesorEntrada'
      responses:
        '201':
          description: Profesor registrado
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Listar a los profesores (RF-08)
      operationId: adminListarProfesores
      responses:
        '200':
          description: Lista de profesores

  /admin/profesores/{id}:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Consultar datos de un profesor (RF-09)
      operationId: adminObtenerProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del profesor
    put:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Modificar datos de un profesor (RF-10)
      operationId: adminActualizarProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfesorEntrada'
      responses:
        '200':
          description: Profesor modificado
    delete:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Eliminar profesor (RF-11)
      operationId: adminEliminarProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Profesor eliminado

  /admin/profesores/{id}/imprimir:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Imprimir datos de profesor (RF-12)
      operationId: adminImprimirProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF de ficha de profesor

  /admin/profesores/{id}/certificaciones:
    post:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Registrar certificaciones de un profesor (RF-13)
      operationId: adminRegistrarCertificacionProfesor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionEntrada'
      responses:
        '201':
          description: Certificación deportiva registrada

  /admin/entrenadores:
    post:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Registrar datos de un entrenador y sus certificaciones (RF-14, RF-20)
      operationId: adminRegistrarEntrenador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrenadorEntrada'
      responses:
        '201':
          description: Entrenador registrado
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Listar a los entrenadores (RF-15)
      operationId: adminListarEntrenadores
      responses:
        '200':
          description: Lista de entrenadores

  /admin/entrenadores/{id}:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Consultar datos de un entrenador (RF-16)
      operationId: adminObtenerEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos del entrenador
    put:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Modificar datos de un entrenador (RF-17)
      operationId: adminActualizarEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntrenadorEntrada'
      responses:
        '200':
          description: Entrenador modificado
    delete:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Eliminar entrenador (RF-18)
      operationId: adminEliminarEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Entrenador dado de baja

  /admin/entrenadores/{id}/imprimir:
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Imprimir datos de entrenador (RF-19)
      operationId: adminImprimirEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: PDF de ficha del entrenador

  /admin/entrenadores/{id}/certificaciones:
    post:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Registrar certificaciones de un entrenador (RF-20)
      operationId: adminRegistrarCertificacionEntrenador
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificacionEntrada'
      responses:
        '201':
          description: Certificación registrada

  # --- CANCHAS E INFRAESTRUCTURA ---
  /admin/tipos-cancha:
    post:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Registrar tipos de canchas y sus características (RF-21)
      operationId: adminRegistrarTipoCancha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TipoCanchaEntrada'
      responses:
        '201':
          description: Tipo de cancha registrado
    get:
      tags:
        - 3. Acceso Administrador (Personal)
      summary: Listar los tipos de canchas y sus características (RF-22)
      operationId: adminListarTiposCancha
      responses:
        '200':
          description: Lista de tipos de canchas

  /admin/tipos-cancha/{id}:
    get:
      tags:
