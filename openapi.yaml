  # === GESTIÓN DE RESERVAS ===
  /reservas:
    post:
      tags:
        - Reservas
      summary: Registrar reservas de canchas (RF-52)
      description: |
        Intenta reservar una cancha. Aplica validaciones estrictas:
        - La fecha no debe ser mayor a 30 días en el futuro (Ventana máxima).
        - La duración de la reserva no debe superar la permitida por tipo de cancha (Fútbol 5: 1h, Fútbol 7: 1.5h, Fútbol 11: 2h).
        - **IMPORTANTE**: La reserva quedará en estado `PENDIENTE` y requiere validación del pago completo asociado para pasar a `CONFIRMADA`.
      operationId: registrarReserva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaEntrada'
      responses:
        '201':
          description: Reserva creada (Estado PENDIENTE hasta confirmación del pago)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          description: Error en validación (Duración excedida, fecha mayor a 30 días o cancha no disponible).
    get:
      tags:
        - Reservas
      summary: Listar las reservas de canchas (RF-53)
      operationId: listarReservas
      parameters:
        - name: fecha
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: estado
          in: query
          required: false
          schema:
            type: string
            enum: [PENDIENTE, CONFIRMADA, CANCELADA]
      responses:
        '200':
          description: Lista de reservas encontradas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reserva'

  /reservas/{id}:
    get:
      tags:
        - Reservas
      summary: Consultar una reserva de cancha específica (RF-54)
      operationId: obtenerReserva
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalles de la reserva
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
    put:
      tags:
        - Reservas
      summary: Modificar reserva de cancha (RF-55)
      operationId: actualizarReserva
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaEntrada'
      responses:
        '200':
          description: Reserva modificada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'

  /reservas/{id}/cancelar:
    post:
      tags:
        - Reservas
      summary: Cancelar una reserva de cancha (RF-56)
      description: |
        Cancela una reserva.
        - Si es antes de las 6 horas previas al inicio, se procesa un reembolso.
        - Si es fuera de ese plazo, se aplica una penalización o pérdida del monto pagado.
      operationId: cancelarReserva
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reserva cancelada exitosamente y cálculos de reembolso aplicados
